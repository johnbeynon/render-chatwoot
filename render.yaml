services:
  - type: web
    name: chatwoot
    runtime: ruby
    plan: standard
    repo: https://github.com/chatwoot/chatwoot
    branch: develop
    buildCommand: bundle install && corepack enable && pnpm install && NODE_OPTIONS="--max-old-space-size=4096" bundle exec rails assets:precompile
    startCommand: bundle exec puma -C config/puma.rb
    preDeployCommand: bundle exec rails db:prepare
    healthCheckPath: /auth/sign_in
    envVars:
      - fromGroup: chatwoot-shared
      - key: NODE_OPTIONS
        value: "--max-old-space-size=4096"
      - key: DATABASE_URL
        fromDatabase:
          name: chatwoot-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: chatwoot-redis
          property: connectionString

  - type: worker
    name: chatwoot-worker
    runtime: ruby
    plan: starter
    repo: https://github.com/chatwoot/chatwoot
    branch: develop
    buildCommand: bundle install
    startCommand: bundle exec sidekiq -C config/sidekiq.yml
    envVars:
      - fromGroup: chatwoot-shared
      - key: DATABASE_URL
        fromDatabase:
          name: chatwoot-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: chatwoot-redis
          property: connectionString

  - type: keyvalue
    name: chatwoot-redis
    plan: free
    ipAllowList: []

databases:
  - name: chatwoot-postgres
    databaseName: chatwoot_production
    user: chatwoot
    plan: basic-256mb
    postgresMajorVersion: "15"
    ipAllowList: []

envVarGroups:
  - name: chatwoot-shared
    envVars:
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: INSTALLATION_ENV
        value: render
      - key: FRONTEND_URL
        sync: false
